<!DOCTYPE html>
<html lang="fr">
<head>
  <title>Galerie GSAP - Défilement Infini</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>
  <div class="BackgroundIncub"></div>
  <div class="gallery">
    <ul class="cards">
      <!-- 31 cartes avec entête externe -->
      <!-- Ex. carte 0 -->
      <li class="card-wrapper">
        <div class="card-header">Carte 0</div>
        <div class="card">
          <div class="left-side">0</div>
          <div class="right-side"></div>
        </div>
      </li>
      <!-- Répéter les suivantes -->
      <!-- ... -->
      <!-- Généré dynamiquement pour clarté -->
      <!-- JS pour générer automatiquement les autres -->
      <script>
        const list = document.querySelector('.cards');
        for (let i = 1; i <= 30; i++) {
          const li = document.createElement('li');
          li.className = "card-wrapper";
          li.innerHTML = `
            <div class="card-header">Carte ${i}</div>
            <div class="card">
              <div class="left-side">${i}</div>
              <div class="right-side"></div>
            </div>
          `;
          list.appendChild(li);
        }
      </script>
    </ul>

    <div class="actions">
      <button class="prev">Prev</button>
      <button class="next">Next</button>
    </div>
  </div>
  <script type="module" src="script.js"></script>
</body>
</html>
